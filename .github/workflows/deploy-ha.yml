name: Deploy Home Assistant

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - dev
      maintenance_mode:
        description: 'Maintenance mode (skip backup restore, config from Git only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      ha_version_override:
        description: 'HA emergency version override'
        required: false

jobs:
  deploy-homeassistant:
    runs-on: ${{ fromJSON(format('["self-hosted","homeassistant","{0}"]', inputs.environment || 'prod')) }}

    steps:
      - name: Setup homelab directory structure
        run: |
          echo "📁 Setting up homelab directory structure..."
          mkdir -p ~/homelab
          echo "✅ Directory structure ready"

      - name: Clone infra repository
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          echo "📦 Cloning homelab-infra repository..."
          
          # Remove old infra if exists
          if [[ -d ~/homelab/infra ]]; then
            echo "Removing old infra..."
            rm -rf ~/homelab/infra
          fi
          
          # Clone infra repo
          git clone \
            https://${GH_USERNAME}:${GH_PAT}@github.com/johantre/homelab-infra.git \
            ~/homelab/infra
          
          # Verify
          if [[ ! -f ~/homelab/infra/site.yml ]]; then
            echo "❌ CRITICAL: site.yml not found in infra repo!"
            exit 1
          fi
          
          echo "✅ Infra repository cloned"
          
          # Change to infra directory for rest of workflow
          cd ~/homelab/infra

      - name: Clone config repository
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          echo "📦 Cloning homelab-config repository..."
          
          # Remove old config if exists
          if [[ -d ~/homelab/config ]]; then
            echo "Removing old config..."
            rm -rf ~/homelab/config
          fi
          
          # Clone config repo
          git clone \
            https://${GH_USERNAME}:${GH_PAT}@github.com/johantre/homelab-config.git \
            ~/homelab/config
          
          # Verify homeassistant directory exists
          if [[ ! -d ~/homelab/config/homeassistant ]]; then
            echo "❌ CRITICAL: homeassistant directory not found!"
            echo "Config repo contents:"
            ls -la ~/homelab/config/
            exit 1
          fi
          
          # Verify configuration.yaml exists
          if [[ ! -f ~/homelab/config/homeassistant/configuration.yaml ]]; then
            echo "❌ CRITICAL: configuration.yaml not found!"
            exit 1
          fi
          
          echo "✅ Config repository cloned"
          echo "Homeassistant config preview:"
          ls -la ~/homelab/config/homeassistant/ | head -n 5

      - name: Verify all secrets are present
        run: |
          echo "🔍 Verifying all required secrets..."
          
          MISSING_SECRETS=()
          
          [[ -z "${{ secrets.GH_USERNAME }}" ]] && MISSING_SECRETS+=("GH_USERNAME")
          [[ -z "${{ secrets.GH_PAT }}" ]] && MISSING_SECRETS+=("GH_PAT")
          [[ -z "${{ secrets.HA_USER_USERNAME }}" ]] && MISSING_SECRETS+=("HA_USER_USERNAME")
          [[ -z "${{ secrets.HA_USER_PASSWORD }}" ]] && MISSING_SECRETS+=("HA_USER_PASSWORD")
          [[ -z "${{ secrets.HA_BACKUP_ENCRYPT_KEY }}" ]] && MISSING_SECRETS+=("HA_BACKUP_ENCRYPT_KEY")
          [[ -z "${{ secrets.HA_LONG_LIVED_TOKEN_GH_ACTIONS_GIT_SYNC }}" ]] && MISSING_SECRETS+=("HA_LONG_LIVED_TOKEN_GH_ACTIONS_GIT_SYNC")
          [[ -z "${{ secrets.CF_TUNNEL_TOKEN }}" ]] && MISSING_SECRETS+=("CF_TUNNEL_TOKEN")
          [[ -z "${{ secrets.SSH_PRIV_KEY_B64 }}" ]] && MISSING_SECRETS+=("SSH_PRIV_KEY_B64")

          if [[ ${#MISSING_SECRETS[@]} -gt 0 ]]; then
            echo "❌ CRITICAL: Missing secrets: ${MISSING_SECRETS[*]}"
            exit 1
          fi
          
          echo "✅ All secrets present"

      - name: Ensure Ansible is installed
        run: |
          echo "🔍 Checking Ansible installation..."
          
          if ! command -v ansible-playbook &> /dev/null; then
            echo "📦 Ansible not found - installing..."
            sudo apt-get update -qq
            sudo apt-get install -y ansible
          fi
          
          ANSIBLE_VERSION=$(ansible-playbook --version | head -n1)
          echo "✅ Ansible: ${ANSIBLE_VERSION}"

      - name: Verify required files exist
        run: |
          echo "🔍 Checking required files..."
          
          cd ~/homelab/infra
          
          MISSING_FILES=()
          
          [[ ! -f "site.yml" ]] && MISSING_FILES+=("site.yml")
          [[ ! -f "inventories/group_vars/all.yml" ]] && MISSING_FILES+=("all.yml")
          [[ ! -f "inventories/ha_target_local.ini" ]] && MISSING_FILES+=("ha_target_local.ini")
          [[ ! -f "inventories/ha_target_remote.ini" ]] && MISSING_FILES+=("ha_target_remote.ini")
          
          if [[ ${#MISSING_FILES[@]} -gt 0 ]]; then
            echo "❌ CRITICAL: Missing files: ${MISSING_FILES[*]}"
            exit 1
          fi
          
          echo "✅ All required files present"

      - name: Stop existing Home Assistant stack
        run: |
          echo "🛑 Stopping existing Home Assistant stack..."
          
          if sg docker -c 'docker compose -p ha-stack-ansible -f "$HOME/homelab/target/ha-stack-ansible/docker-compose.yml" down' 2>/dev/null; then
            echo "✅ Stack stopped successfully"
          else
            echo "ℹ️  No existing stack found (this is OK)"
          fi

      - name: Clean up existing deployment
        run: |
          MAINTENANCE_MODE="${{ github.event.inputs.maintenance_mode || 'true' }}"

          echo "═══════════════════════════════════════════════════════════════════"
          if [[ "$MAINTENANCE_MODE" == "true" ]]; then
            echo "🔧 MAINTENANCE MODE - preserving runtime state"
          else
            echo "🔄 DISASTER RECOVERY MODE - full cleanup (backup will restore)"
          fi
          echo "═══════════════════════════════════════════════════════════════════"

          if [[ "$MAINTENANCE_MODE" != "true" ]]; then
            # DR MODE: Full cleanup - backup restore will repopulate
            if [[ -d "$HOME/homelab/target/ha-stack-ansible" ]]; then
              echo "Removing ha-stack-ansible (DR mode)..."
              sudo rm -rf "$HOME/homelab/target/ha-stack-ansible"
              echo "✅ Removed ha-stack-ansible"
            fi

            if [[ -d "$HOME/homelab/target/homeassistant-ansible" ]]; then
              echo "Removing homeassistant-ansible (DR mode)..."
              sudo rm -rf "$HOME/homelab/target/homeassistant-ansible"
              echo "✅ Removed homeassistant-ansible"
            fi
          else
            # MAINTENANCE MODE: Preserve everything, Ansible rsync will update config only
            echo "ℹ️  Keeping ha-stack-ansible/ intact (version lock, compose)"
            echo "ℹ️  Keeping homeassistant-ansible/ intact (.storage, database)"
          fi

          echo "✅ Cleanup complete"

      - name: Deploy Home Assistant with Ansible
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_PAT: ${{ secrets.GH_PAT }}
          SSH_PRIV_KEY_B64: ${{ secrets.SSH_PRIV_KEY_B64 }}
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          HA_USER_USERNAME: ${{ secrets.HA_USER_USERNAME }}
          HA_USER_PASSWORD: ${{ secrets.HA_USER_PASSWORD }}
          HA_BACKUP_ENCRYPT_KEY: ${{ secrets.HA_BACKUP_ENCRYPT_KEY }}
          HA_LONG_LIVED_TOKEN_GH_ACTIONS_GIT_SYNC: ${{ secrets.HA_LONG_LIVED_TOKEN_GH_ACTIONS_GIT_SYNC }}
        run: |
          echo "🚀 Starting Home Assistant deployment..."
          
          cd ~/homelab/infra
          
          set -e
          set -o pipefail
          
          # Run Ansible from infra directory
          # maintenance_mode=true (default): config from Git only, skip backup restore
          # maintenance_mode=false: disaster recovery, restore runtime state from backup
          ansible-playbook \
            -i inventories/ha_target_local.ini \
            deploy-ha.yml \
            -e maintenance_mode=${{ github.event.inputs.maintenance_mode || 'true' }} \
            -e ha_version_override=${{ github.event.inputs.ha_version_override }} \
            -vv \
            2>&1 | tee ansible-deploy.log
          
          ANSIBLE_EXIT_CODE=${PIPESTATUS[0]}
          
          if [[ ${ANSIBLE_EXIT_CODE} -ne 0 ]]; then
            echo ""
            echo "❌ CRITICAL: Ansible deployment FAILED!"
            echo "Exit code: ${ANSIBLE_EXIT_CODE}"
            echo ""
            echo "📋 Last 50 lines of output:"
            tail -n 50 ansible-deploy.log
            exit 1
          fi
          
          echo "✅ Ansible deployment completed successfully!"

      - name: Verify deployment success
        run: |
          echo "🔍 Verifying deployment..."
          
          # Check if homeassistant container is running
          if ! sg docker -c 'docker ps --filter "name=homeassistant_ansible" --format "{{.Names}}"' | grep -q "homeassistant_ansible"; then
            echo "❌ CRITICAL: Home Assistant container is NOT running!"
            echo ""
            echo "Docker containers:"
            sg docker -c 'docker ps -a --filter "name=homeassistant" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"'
            echo ""
            echo "Docker logs (last 30 lines):"
            sg docker -c 'docker logs homeassistant_ansible --tail 30' 2>&1 || echo "Could not fetch logs"
            exit 1
          fi
          
          echo "✅ Home Assistant container is running"
          
          # Check if HA is responding (wait max 60 seconds)
          echo "Waiting for Home Assistant to be ready..."
          HA_PORT=$(cat ~/homelab/target/ha-stack-ansible/.ha_port)
          echo "HA_PORT=${HA_PORT}" >> $GITHUB_ENV
          for i in {1..12}; do
            if curl -f -s "http://localhost:${HA_PORT}/" > /dev/null 2>&1; then
              echo "✅ Home Assistant is responding!"
              break
            fi
          
            if [[ $i -eq 12 ]]; then
              echo "❌ CRITICAL: Home Assistant not responding after 60 seconds!"
              echo ""
              echo "Container logs:"
              sg docker -c 'docker logs homeassistant_ansible --tail 50'
              exit 1
            fi
          
            echo "  Attempt $i/12 - waiting..."
            sleep 5
          done

      - name: Deployment Summary
        if: always()
        run: |
          echo ""
          echo "======================================"
          echo "📊 DEPLOYMENT SUMMARY"
          echo "======================================"
          echo "Deployed to: localhost (self-hosted runner)"
          echo "Access URL: http://$(hostname -I | awk '{print $1}'):${HA_PORT}"
          echo ""
          echo "Running containers:"
          sg docker -c 'docker ps --filter "name=homeassistant\|cloudflared\|code_server\|esphome" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"' || echo "Could not list containers"
          echo ""
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "✅ DEPLOYMENT SUCCESSFUL!"
          else
            echo "❌ DEPLOYMENT FAILED - Check logs above"
          fi
          echo "======================================"

      - name: Upload Ansible logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ansible-deploy-log
          path: ~/homelab/infra/ansible-deploy.log
          retention-days: 7