---
# Set HA backup encryption key to match HA_BACKUP_ENCRYPT_KEY secret.
# Writes directly to .storage/backup — run while HA is stopped.
# Direction: secrets → HA (always, all deploy modes)

- name: Copy backup key configuration script to target
  ansible.builtin.copy:
    src: configure_backup_key.py
    dest: /tmp/configure_backup_key.py
    mode: "0644"

- name: Stop HA container for backup key configuration
  ansible.builtin.shell: |
    sg docker -c 'docker stop {{ ha_container_name }}'
  changed_when: true

- name: Set backup encryption key in .storage/backup
  ansible.builtin.shell: |
    python3 /tmp/configure_backup_key.py \
      {{ ha_config_dir | quote }} \
      {{ ha_backup_encrypt_key | quote }}
  register: backup_key_result
  no_log: true
  changed_when: true

- name: Show backup key configuration result
  ansible.builtin.debug:
    msg: "{{ backup_key_result.stdout }}"

- name: Start HA container after backup key configuration
  ansible.builtin.shell: |
    sg docker -c 'docker start {{ ha_container_name }}'
  changed_when: true

- name: Clean up script
  ansible.builtin.file:
    path: /tmp/configure_backup_key.py
    state: absent
  failed_when: false
